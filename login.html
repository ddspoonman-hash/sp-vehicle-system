<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>運転者ログイン</title>
</head>
<body>

<h2>運転者ログイン</h2>

<div id="driverArea" style="display:none">
<select id="driver"></select>
</div>

<input id="pass" type="password" placeholder="パスコード">

<button onclick="login()">ログイン</button>

<script>

const GAS="https://script.google.com/macros/s/AKfycbxkgNmKdoeilTzXtelG_1VZNu8MHP0wxxkPNLaS-OY4Ix2V08bxJx7CyYMlozKyirLN/exec";

async function loadDrivers(){

const res=await fetch(GAS+"?type=drivers");
const drivers=await res.json();

let html="";

drivers.forEach(d=>{
html+=`<option value="${d.name}">${d.name}</option>`;
});

driver.innerHTML=html;

document.getElementById("driverArea").style.display="block";

}

async function login(){

const res = await fetch(GAS+"?type=drivers");

const drivers = await res.json();

const selected = driver.value;
const passcode = pass.value;

const user = drivers.find(d => d.name === selected);

if(!user || user.pass !== passcode){

alert("パスコードが違います");
return;

}

localStorage.setItem("driver", selected);

location.href="driver_start.html";

}

loadDrivers();

</script>

</body>
</html>
