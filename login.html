<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>

<h2>運転者ログイン</h2>

<select id="driver"></select>

<button onclick="login()">ログイン</button>

<script>

const GAS="https://script.google.com/macros/s/AKfycbxkgNmKdoeilTzXtelG_1VZNu8MHP0wxxkPNLaS-OY4Ix2V08bxJx7CyYMlozKyirLN/exec";

async function loadDrivers(){

const res=await fetch(GAS+"?type=drivers");
const drivers=await res.json();

let html="";

drivers.forEach(d=>{
html+=`<option>${d}</option>`;
});

driver.innerHTML=html;

}

function login(){

localStorage.setItem("driver",driver.value);

location.href="driver_start.html";

}

loadDrivers();

</script>

</body>
</html>
